name: unitrack_helper
description: "UniTrack helper app — the on-bus phone is the fleet's only GPS sensor."
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_foreground_task: ^10.0.0
  flutter_secure_storage: ^10.3.1
  geolocator: ^14.0.3
  http: ^1.6.0
  shared_preferences: ^2.5.5
  # Declarative routing. Worth the dependency at eight screens: it keeps
  # redirect logic (locked -> PIN, signed out -> login) in one place instead of
  # scattered across every page's initState.
  go_router: ^14.6.2
  # Durable GPS queue. Fixes currently live in memory and die with the process,
  # which is exactly the failure the spec's offline-first requirement forbids.
  sqflite: ^2.4.1
  path: ^1.9.0
  # PIN verification hashing — see data/session_store.dart.
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
